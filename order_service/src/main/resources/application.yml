server:
  port: 8082

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/deliguy_order
    username: root
    password: root
  
  cloud:
    gateway:
      routes:
        - id: order-service
          uri: http://localhost:8082
          predicates:
            - Path=/orders/**
          filters:
            - AddRequestHeader=X-GATEWAY-INTERNAL, true

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

server:
  port: ${SERVER_PORT:8086}

spring:
  application:
    name: router-service
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      timeout: 5000ms

router:
  api:
    base-url: https://api.openrouteservice.org
    api-key: ${ORS_API_KEY:}
    profile: driving-car
    cache-ttl-minutes: 60

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    redis:
      enabled: true

logging:
  level:
    com.deliguy: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

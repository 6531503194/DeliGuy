services:
  # ===============================
  # Infrastructure Services
  # ===============================
  
  mysql:
    image: mysql:8
    container_name: deliguy-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: deliguy
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - deliguy-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: deliguy-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - deliguy-network
    restart: unless-stopped

  kafka:
    image: apache/kafka:3.7.0
    container_name: deliguy-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - deliguy-network
    restart: unless-stopped

  # ===============================
  # Eureka Service Registry
  # ===============================
  
  eureka-service:
    build: ./eureka-service
    container_name: deliguy-eureka
    ports:
      - "8761:8761"
    environment:
      - SPRING_PROFILES_ACTIVE=default
      - EUREKA_HOST=eureka-service
      - EUREKA_PORT=8761
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - deliguy-network
    restart: unless-stopped

  # ===============================
  # Microservices
  # ===============================

  auth-service:
    build: ./auth-service
    container_name: deliguy-auth-service
    environment:
      - SPRING_PROFILES_ACTIVE=default
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - DB_NAME=auth_db
      - MYSQL_USERNAME=root
      - MYSQL_PASSWORD=root
      - KAFKA_HOST=kafka
      - EUREKA_HOST=eureka-service
      - EUREKA_PORT=8761
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - deliguy-network
    restart: unless-stopped

  order-service:
    build: ./order-service
    container_name: deliguy-order-service
    environment:
      - SPRING_PROFILES_ACTIVE=default
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - DB_NAME=order_db
      - MYSQL_USERNAME=root
      - MYSQL_PASSWORD=root
      - KAFKA_HOST=kafka
      - AUTH_HOST=auth-service
      - EUREKA_HOST=eureka-service
      - EUREKA_PORT=8761
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      auth-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - deliguy-network
    restart: unless-stopped

  restaurant-service:
    build: ./restaurant-service
    container_name: deliguy-restaurant-service
    environment:
      - SPRING_PROFILES_ACTIVE=default
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - DB_NAME=restaurant_db
      - MYSQL_USERNAME=root
      - MYSQL_PASSWORD=root
      - KAFKA_HOST=kafka
      - AUTH_HOST=auth-service
      - EUREKA_HOST=eureka-service
      - EUREKA_PORT=8761
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      auth-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - deliguy-network
    restart: unless-stopped

  biker-service:
    build: ./biker-service
    container_name: deliguy-biker-service
    environment:
      - SPRING_PROFILES_ACTIVE=default
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - DB_NAME=biker_db
      - MYSQL_USERNAME=root
      - MYSQL_PASSWORD=root
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - KAFKA_HOST=kafka
      - AUTH_HOST=auth-service
      - EUREKA_HOST=eureka-service
      - EUREKA_PORT=8761
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - deliguy-network
    restart: unless-stopped

  # ===============================
  # API Gateway
  # ===============================
  
  api-gateway:
    build: ./delivery
    container_name: deliguy-api-gateway
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=default
      - AUTH_HOST=auth-service
      - AUTH_PORT=8081
      - EUREKA_HOST=eureka-service
      - EUREKA_PORT=8761
    depends_on:
      eureka-service:
        condition: service_healthy
      auth-service:
        condition: service_started
      order-service:
        condition: service_started
      restaurant-service:
        condition: service_started
      biker-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - deliguy-network
    restart: unless-stopped

networks:
  deliguy-network:
    driver: bridge

volumes:
  mysql_data:

services:
  # ===============================
  # Infrastructure Services
  # ===============================
  
  mysql:
    image: mysql:8
    container_name: deliguy-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: deliguy
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - deliguy-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: deliguy-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - deliguy-network
    restart: unless-stopped

  kafka:
    image: apache/kafka:3.7.0
    container_name: deliguy-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - deliguy-network
    restart: unless-stopped

  # ===============================
  # Microservices
  # ===============================

  auth-service:
    build: ./auth-service
    container_name: deliguy-auth-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=default
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - DB_NAME=auth_db
      - MYSQL_USERNAME=root
      - MYSQL_PASSWORD=root
      - KAFKA_HOST=kafka
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - deliguy-network
    restart: unless-stopped

  order-service:
    build: ./order-service
    container_name: deliguy-order-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=default
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - DB_NAME=order_db
      - MYSQL_USERNAME=root
      - MYSQL_PASSWORD=root
      - KAFKA_HOST=kafka
      - AUTH_HOST=auth-service
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      auth-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8082/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - deliguy-network
    restart: unless-stopped

  restaurant-service:
    build: ./restaurant-service
    container_name: deliguy-restaurant-service
    ports:
      - "8084:8084"
    environment:
      - SPRING_PROFILES_ACTIVE=default
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - DB_NAME=restaurant_db
      - MYSQL_USERNAME=root
      - MYSQL_PASSWORD=root
      - KAFKA_HOST=kafka
      - AUTH_HOST=auth-service
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      auth-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8084/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - deliguy-network
    restart: unless-stopped


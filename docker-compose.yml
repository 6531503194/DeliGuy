  # ===============================
  # API Gateway
  # ===============================
  
  api-gateway:
    build: ./delivery
    container_name: deliguy-api-gateway
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=default
      - AUTH_HOST=auth-service
      - AUTH_PORT=8081
      - ORDER_HOST=order-service
      - ORDER_PORT=8082
      - RESTAURANT_HOST=restaurant-service
      - RESTAURANT_PORT=8084
      - BIKER_HOST=biker-service
      - BIKER_PORT=8085
      - ROUTER_HOST=router-service
      - ROUTER_PORT=8086
      - ADMIN_HOST=admin-service
      - ADMIN_PORT=8087
      - ANALYTICS_HOST=analytics-service
      - ANALYTICS_PORT=8088
    depends_on:
      auth-service:
        condition: service_started
      order-service:
        condition: service_started
      restaurant-service:
        condition: service_started

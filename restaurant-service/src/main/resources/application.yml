# ===============================
# Server
# ===============================
server:
  port: 8084

spring:
  application:
    name: restaurant-service

  # ===============================
  # Database (MySQL)
  # ===============================
  datasource:
    url: jdbc:mysql://mysql:3306/deliguy_restaurant
    # username: root
    # password: root
    # driver-class-name: com.mysql.cj.jdbc.Driver

  # ===============================
  # JPA / Hibernate
  # ===============================
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect
    properties:
      hibernate:
        format_sql: true

  # ===============================
  # Security (JWT Resource Server)
  # ===============================
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://auth-service:8081/auth/.well-known/jwks.json

# ===============================
# Logging (currently commented)
# ===============================
# logging:
#   level:
#     org.springframework.security: INFO
#     org.hibernate.SQL: DEBUG

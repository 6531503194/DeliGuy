server:
  port: 8080

spring:
  application:
    name: delivery-api-gateway

  cloud:
    gateway:
      routes:
        # Auth Service Route
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/auth/**

        # Order Service Route
        - id: order-service
          uri: http://localhost:8082
          predicates:
            - Path=/orders/**

        # Restaurant Service Route
        - id: restaurant-service
          uri: http://localhost:8083
          predicates:
            - Path=/tracking/**

      default-filters:
        - StripPrefix=1

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:8081/.well-known/jwks.json
